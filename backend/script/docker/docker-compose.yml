services:
  mysql:
    image: mysql:8.0
    container_name: velox-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: velox
    ports:
      - "3306:3306"
    volumes:
      # The default language is Chinese.
      - ../sql/mysql/init-zh-CN.sql:/docker-entrypoint-initdb.d/init.sql
      # You can switch to English by mounting the corresponding SQL file. ⬇
      # - ../sql/mysql/init-en.sql:/docker-entrypoint-initdb.d/init.sql ⬅
      - mysql-data:/var/lib/mysql

  postgresql:
    image: postgres:18.4
    container_name: velox-postgresql
    restart: always
    environment:
      POSTGRES_DB: velox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # The default language is Chinese. 
      - ../sql/postgresql/init-zh-CN.sql:/docker-entrypoint-initdb.d/init.sql
      # You can switch to English by mounting the corresponding SQL file. ⬇
      # - ../sql/postgresql/init-en.sql:/docker-entrypoint-initdb.d/init.sql ⬅
      # postgres 18+ requires mounting the parent directory instead of PGDATA itself.
      - postgresql-data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: velox-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      # 容器内运行，$$ 转义以读取容器运行时的 REDIS_PASSWORD
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - redis-data:/data
    # 备注：本 compose 仅编排基础设施容器，暂无 app 服务。
    # 未来若新增后端 app 服务，应：depends_on: { redis: { condition: service_healthy } }

volumes:
  mysql-data:
  postgresql-data:
  redis-data:
