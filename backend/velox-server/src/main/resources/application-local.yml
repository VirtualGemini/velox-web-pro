# 本地环境配置
spring:
  data:
    redis:
      # 本地 Redis 主机
      host: localhost
      # 本地 Redis 端口
      port: 6379
      # 本地 Redis 密码；通过 REDIS_PASSWORD 注入（与 docker-compose 的 requirepass 对齐），未设置时为空
      password: 
      # Redis 库编号
      database: 0

springdoc:
  api-docs:
    # 本地环境默认开启 OpenAPI 文档
    enabled: true
  swagger-ui:
    # 本地环境默认开启 Swagger UI，便于接口调试
    enabled: true

logging:
  level:
    # 本地环境业务日志级别
    com.velox: INFO
  file:
    # 本地日志输出目录
    path: ./log

system:
  log:
    trusted-proxy:
      # 本地前端通常经 Vite 代理访问后端，需要信任一跳代理转发头才能记录真实设备 IP。
      enabled: true
      trusted-hops: 1

velox:
  datasource:
    # 当前激活数据库类型，默认推荐 PostgreSQL；可选 mysql / postgresql
    type: ${DB_TYPE:mysql}
    # 并存的多套数据库连接配置
    configs:
      mysql:
        # MySQL 连接
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: ${MYSQL_DB_URL:jdbc:mysql://localhost:3306/velox?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT&allowPublicKeyRetrieval=true}
        username: ${MYSQL_DB_USERNAME:root}
        password: ${MYSQL_DB_PASSWORD:root}
      postgresql:
        # PostgreSQL 18.x 连接
        driver-class-name: org.postgresql.Driver
        url: ${POSTGRESQL_DB_URL:jdbc:postgresql://localhost:5432/velox}
        username: ${POSTGRESQL_DB_USERNAME:postgres}
        password: ${POSTGRESQL_DB_PASSWORD:postgres}
  web:
    cors:
      # 本地前端联调允许的来源
      allowed-origin-patterns:
        - ${CORS_ALLOWED_ORIGINS:http://localhost:*}
        - "http://127.0.0.1:*"
        - "http://192.168.*:*"
        - "http://10.*:*"
        - "http://172.16.*:*"
        - "http://172.17.*:*"
        - "http://172.18.*:*"
        - "http://172.19.*:*"
        - "http://172.20.*:*"
        - "http://172.21.*:*"
        - "http://172.22.*:*"
        - "http://172.23.*:*"
        - "http://172.24.*:*"
        - "http://172.25.*:*"
        - "http://172.26.*:*"
        - "http://172.27.*:*"
        - "http://172.28.*:*"
        - "http://172.29.*:*"
        - "http://172.30.*:*"
        - "http://172.31.*:*"
        - "https://*.trycloudflare.com"
        - "https://*.ngrok-free.dev"
  security:
    # 本地环境允许未登录访问 Swagger UI 与 OpenAPI 文档
    swagger-public-enabled: true
  system:
    auth:
      rate-limit:
        trusted-proxy:
          # 与本地 Vite 代理联调一致，避免所有登录设备共用 ::1 做 IP 限流。
          enabled: true
          trusted-hops: 1
      # 验证码 HMAC 摘要密钥；本地可使用默认值，生产环境必须覆盖
      verification:
        secret: ${VERIFICATION_SECRET:velox-local-verification-secret}
        # 邮件重置验证码有效期（秒）
        reset-code-ttl-seconds: 600
        # 邮件重置验证码重复发送间隔（秒）
        reset-code-resend-interval-seconds: 60
  redis:
    cache:
      # 本地环境默认关闭 Spring Cache 层，避免引入未使用的缓存复杂度
      enabled: false
      # 若误用缓存能力，默认快速失败便于及时发现
      disabled-strategy: FAIL_FAST
  id:
    snowflake:
      # true 使用 Snowflake BIGINT；false 使用数据库序列 BIGINT
      enabled: true
      # true：前后端使用 Base62 编解码（与生产一致）；false：直传原始雪花 ID 便于排查
      base62: true
    database:
      # 本地启动时自动对齐数据库 ID 对象与业务表 BIGINT 主键，便于反复验证迁移
      init-mode: update
    # 本地默认单节点发号；多实例联调时请通过环境变量覆盖
    worker-id: ${VELOX_ID_WORKER_ID:1}
    # 本地默认单机房编号；跨环境并行调试时请保持唯一规划
    datacenter-id: ${VELOX_ID_DATACENTER_ID:1}
  file:
    # 是否启用文件能力；本地环境显式开启，避免依赖默认值
    enabled: true
  email:
    # false 时注入 disabled/noop 实现；true 时启用邮件能力
    # 发件邮箱（host/username/password/from/ssl 等）已改为数据库热配置：配置管理 - 邮箱管理（sys_mail_account 发件池），
    # 由 PooledMailChannel 在发送时按账号动态挑选并覆盖发件人，业务调用点零改动。
    # 下方 username/password 仅为占位，用于满足 starter 在 enabled=true 时的非空校验，实际发送不再使用本处凭据。
    enabled: true
    # 占位用户名（真实发件账号来自数据库发件池）
    username: ${MAIL_USERNAME:pool@velox.local}
    # 占位密码（真实授权码来自数据库发件池）
    password: ${MAIL_PASSWORD:pool-placeholder}
    # 默认发件人名称（账号未单独配置发件人名称时的兜底）
    from-name: Velox
    async:
      # 是否开启异步发送
      enabled: true
      # JDK 25 下默认使用虚拟线程提升并发能力
      virtual-threads: true
      # 最大并发发送任务数
      concurrency-limit: ${MAIL_CONCURRENCY_LIMIT:512}
      # 异步线程名前缀，便于排查日志
      thread-name-prefix: velox-email-
    retry:
      # 默认发送尝试次数；业务未显式指定时生效
      default-attempts: 1
      # 全局允许的最大尝试次数上限
      max-attempts: 3
      # 首次重试延迟
      initial-delay: 1s
      # 指数退避倍数
      multiplier: 2.0
      # 最大退避延迟
      max-delay: 30s
    logging:
      # 是否输出邮件模块日志
      enabled: true
      # 日志级别：ERROR/WARN/INFO/DEBUG
      level: INFO
