# 服务端口与 Servlet 容器基础配置
server:
  # 应用监听端口
  port: 8080
  servlet:
    # 应用上下文路径，保持根路径便于前后端联调
    context-path: /
  tomcat:
    # URI 编码，避免中文参数乱码
    uri-encoding: UTF-8
    threads:
      # Tomcat 最大工作线程数
      max: 800
      # Tomcat 最小空闲线程数
      min-spare: 100

# Spring Boot 通用配置
spring:
  config:
    # 额外导入数据库 ID 治理声明，避免主配置文件过长
    import: classpath:id.yml
  profiles:
    # 当前默认激活环境
    active: local
  application:
    # 应用名称
    name: velox
  messages:
    # 国际化消息资源路径
    basename: i18n/messages
    # 国际化资源编码
    encoding: UTF-8
    # 找不到消息时直接返回 key，便于排查
    use-code-as-default-message: true
  jackson:
    # 全局日期时间输出格式
    date-format: yyyy-MM-dd HH:mm:ss
    # 默认时区
    time-zone: GMT+8
    # null 字段不输出
    default-property-inclusion: non_null
    serialization:
      # 禁止将时间序列化为时间戳
      write-dates-as-timestamps: false
      # 允许序列化空 Bean
      fail-on-empty-beans: false
    deserialization:
      # 反序列化时忽略未知字段
      fail-on-unknown-properties: false

# MyBatis Plus 配置
mybatis-plus:
  # Mapper XML 扫描路径
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      # 主键策略：业务侧显式传入
      id-type: input
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0
  configuration:
    # 下划线字段自动映射为驼峰属性
    map-underscore-to-camel-case: true
    # 使用 slf4j 输出 SQL 日志
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    # 是否启用 OpenAPI JSON 文档
    enabled: true
    # OpenAPI 文档访问路径
    path: /v3/api-docs
  swagger-ui:
    # 是否启用 Swagger UI
    enabled: true
    # Swagger UI 访问路径
    path: /swagger-ui.html

# 应用自定义配置
velox:
  # 系统名称
  name: velox
  # 系统版本
  version: 1.0.0
  # 所有 REST 接口统一前缀
  api-prefix: /api
  web:
    cors:
      # 允许跨域访问的来源模式
      allowed-origin-patterns:
        - "http://localhost:*"
        - "http://127.0.0.1:*"
      # 允许的跨域请求方法
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      # 允许携带的请求头
      allowed-headers:
        - "*"
      # 暴露给浏览器的响应头
      exposed-headers:
        - Authorization
        - X-Trace-Id
      # 是否允许跨域携带 Cookie / 认证头
      allow-credentials: true
      # 跨域预检缓存时间（秒）
      max-age: 3600
  security:
    # 是否允许未登录公开访问 Swagger
    swagger-public-enabled: false
    password:
      # 可配置算法: bcrypt(默认) / pbkdf2_sha512 / md5(仅兼容历史数据，不推荐)
      algorithm: bcrypt
      # 登录成功后是否自动升级旧密码哈希
      upgrade-on-login: true
      # bcrypt 成本因子，范围建议 10~14
      bcrypt-strength: 12
      # PBKDF2-SHA512 迭代次数，建议 >= 210000
      pbkdf2-iterations: 210000
      # PBKDF2 输出长度（bit），建议 256
      pbkdf2-key-length: 256
      # PBKDF2 盐值长度（byte），建议 >= 16
      pbkdf2-salt-length: 16
    login:
      # 最大登录失败次数，超过后进入锁定
      max-fail-count: 5
      # 登录失败锁定时长（分钟）
      lock-minutes: 30
      presence:
        # 是否在每次已登录请求时刷新在线心跳
        request-heartbeat-enabled: true
        # 是否在登录成功时写入在线状态
        login-signal-enabled: true
        # 是否在退出登录时写入离线状态
        logout-signal-enabled: true
        # 登录态但长时间无请求时的离线判定秒数
        idle-offline-seconds: 6000
        # 显式退出登录后的离线判定秒数；设置为 0 表示立即离线
        logout-offline-seconds: 120
    captcha:
      # 图形验证码有效期（秒）
      ttl-seconds: 120
      # 验证码缓存的最大条数
      max-cache-size: 10000
    token:
      # token provider 模式：stateful / jwt
      mode: stateful
      # Token 名称
      token-name: Authorization
      # Token 有效期（秒）
      timeout: 86400
      # 是否允许同账号并发登录
      concurrent: true
      # 是否共享同一 Token；false 表示每次登录单独发放
      share: false
      # stateful provider 下的 token 生成风格
      style: uuid
      # 是否输出底层认证日志
      log-enabled: false
      # 是否从请求头中读取 Token
      read-header: true
      # 是否从 Cookie 中读取 Token
      read-cookie: false
      jwt:
        # jwt 运行策略：simple / mixin / stateless
        strategy: mixin
        # 建议通过环境变量覆盖
        secret: ${VELOX_SECURITY_JWT_SECRET:change-this-jwt-secret}
        # jwt 模式下是否回写响应头
        write-header: true

# 日志配置
logging:
  level:
    # 根日志级别
    root: INFO
    # 业务包日志级别
    com.velox: DEBUG
  # Logback 主配置文件路径
  config: classpath:logback-spring.xml
