# 测试环境配置
spring:
  data:
    redis:
      # 测试环境 Redis 主机
      host: localhost
      # 测试环境 Redis 端口
      port: 6379
      # 测试环境使用独立 Redis 库，避免污染开发数据
      database: 1

logging:
  level:
    # 测试环境业务日志级别
    com.velox: INFO
  file:
    # 测试环境日志目录
    path: ./logs

velox:
  datasource:
    # 当前激活数据库类型，默认推荐 PostgreSQL；可选 mysql / postgresql
    type: ${DB_TYPE:postgresql}
    # 并存的多套数据库连接配置
    configs:
      mysql:
        # MySQL 连接
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: ${MYSQL_DB_URL:jdbc:mysql://localhost:3306/velox_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT&allowPublicKeyRetrieval=true}
        username: ${MYSQL_DB_USERNAME:root}
        password: ${MYSQL_DB_PASSWORD:root}
      postgresql:
        # PostgreSQL 18.x 连接
        driver-class-name: org.postgresql.Driver
        url: ${POSTGRESQL_DB_URL:jdbc:postgresql://localhost:5432/velox_test}
        username: ${POSTGRESQL_DB_USERNAME:postgres}
        password: ${POSTGRESQL_DB_PASSWORD:postgres}
  security:
    # 测试环境可公开 Swagger，便于接口调试
    swagger-public-enabled: true
    verification:
      # 验证码 HMAC 摘要密钥，测试环境建议通过环境变量覆盖
      secret: ${VERIFICATION_SECRET:change-this-verification-secret}
      # 邮件重置验证码有效期（秒）
      reset-code-ttl-seconds: 600
      # 邮件重置验证码重复发送间隔（秒）
      reset-code-resend-interval-seconds: 60
  redis:
    # 测试环境默认开启 Redis；关闭后验证码和在线状态改为内存实现
    enabled: true
    cache:
      # 测试环境默认关闭 Spring Cache 层，避免测试结果被缓存干扰
      enabled: false
      # 测试环境默认快速失败，便于发现错误的缓存依赖
      disabled-strategy: FAIL_FAST
  id:
    # 测试环境显式开启业务主键能力，避免依赖 Java 默认值
    enabled: true
    # 测试环境默认走 Snowflake；回归 UUID 兼容性时再显式切换；只建议在开发环境或初始化数据库时切换
    strategy: snowflake
    database:
      # 测试环境启动时自动对齐数据库 ID 对象，保证回归环境与当前配置一致
      init-mode: update
      # 显式保留元数据告警开关，避免测试环境掩盖配置漂移
      warn-on-prod-mismatch: true
    snowflake:
      # 测试环境节点编号建议独立规划，避免与开发环境冲突
      worker-id: ${VELOX_ID_WORKER_ID:1}
      # 测试环境机房编号建议与实际部署拓扑保持一致
      datacenter-id: ${VELOX_ID_DATACENTER_ID:1}
  file:
    # 是否启用文件能力；测试环境显式开启，避免依赖默认值
    enabled: true
  # 测试环境默认关闭邮件模块，避免误发真实邮件
  email:
    # false 时注入 disabled/noop 实现，避免测试环境因为缺少邮件配置而启动失败
    enabled: false
