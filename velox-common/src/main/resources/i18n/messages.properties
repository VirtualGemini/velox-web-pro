ClientErrorCode.CONFLICT=资源冲突
ClientErrorCode.TOO_MANY_REQUESTS=请求过于频繁
ClientErrorCode.VALIDATION_ERROR=参数校验失败
ClientErrorCode.PAYLOAD_TOO_LARGE=请求数据过大

